<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Click Game</title>
    <style>
      :root {
        --bg1: #fff7fb;
        --bg2: #ffe3ee;
        --card: rgba(255, 255, 255, 0.7);
        --text: #3b1f2b;
        --muted: #7d5a67;
        --accent: #ff4d88;
        --accent-dark: #e23472;
        --gold: #ffd166;
        --shadow: 0 20px 50px rgba(226, 52, 114, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 35%),
          linear-gradient(180deg, var(--bg1), var(--bg2));
        overflow: hidden;
      }
      .app {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        position: relative;
      }
      .card {
        width: min(92vw, 440px);
        background: var(--card);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.75);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 20px;
        text-align: center;
        position: relative;
        z-index: 2;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 6vw, 42px);
        line-height: 1.05;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 15px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }
      .stat {
        flex: 1;
        background: rgba(255, 255, 255, 0.75);
        border-radius: 18px;
        padding: 12px 10px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }
      .label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .value {
        font-size: 22px;
        font-weight: 700;
      }
      .game-area {
        margin-top: 16px;
        height: 52vh;
        min-height: 320px;
        max-height: 480px;
        border-radius: 24px;
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.32)),
          repeating-linear-gradient(
            45deg,
            rgba(255, 255, 255, 0.16),
            rgba(255, 255, 255, 0.16) 10px,
            rgba(255, 255, 255, 0.08) 10px,
            rgba(255, 255, 255, 0.08) 20px
          );
        border: 1px solid rgba(255, 255, 255, 0.8);
      }
      .heart {
        position: absolute;
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        font-size: 38px;
        cursor: pointer;
        user-select: none;
        filter: drop-shadow(0 10px 10px rgba(255, 77, 136, 0.25));
        animation: popIn 0.18s ease-out;
        transition: transform 0.12s ease;
        touch-action: manipulation;
      }
      .heart:active {
        transform: scale(0.92);
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }
      button {
        flex: 1;
        border: 0;
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        min-height: 48px;
      }
      .primary {
        background: linear-gradient(180deg, var(--accent), var(--accent-dark));
        color: #fff;
        box-shadow: 0 14px 24px rgba(255, 77, 136, 0.28);
      }
      .secondary {
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
      }
      .message {
        margin-top: 14px;
        min-height: 22px;
        font-weight: 700;
        color: var(--accent-dark);
      }
      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(255, 240, 246, 0.72);
        backdrop-filter: blur(10px);
        z-index: 5;
      }
      .overlay.show {
        display: flex;
      }
      .win-box {
        width: min(90vw, 360px);
        background: white;
        border-radius: 24px;
        padding: 24px 20px;
        box-shadow: var(--shadow);
        text-align: center;
      }
      .win-box .big {
        font-size: 56px;
        line-height: 1;
        margin-bottom: 10px;
      }
      .floating {
        position: absolute;
        font-size: 22px;
        font-weight: 700;
        color: var(--accent-dark);
        pointer-events: none;
        animation: floatUp 700ms ease-out forwards;
        z-index: 4;
      }
      .sparkle {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--gold);
        pointer-events: none;
        animation: sparkle 600ms ease-out forwards;
        z-index: 3;
      }
      .hint {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }
      @keyframes popIn {
        from {
          transform: scale(0.75);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes floatUp {
        from {
          transform: translateY(0) scale(0.9);
          opacity: 1;
        }
        to {
          transform: translateY(-34px) scale(1.15);
          opacity: 0;
        }
      }
      @keyframes sparkle {
        from {
          transform: translate(0, 0) scale(1);
          opacity: 1;
        }
        to {
          transform: translate(var(--x), var(--y)) scale(0.2);
          opacity: 0;
        }
      }
      @media (max-width: 480px) {
        .card {
          padding: 16px;
        }
        .heart {
          width: 54px;
          height: 54px;
          font-size: 34px;
        }
        .game-area {
          min-height: 360px;
          height: 56vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="card">
        <div class="topbar">
          <div class="stat">
            <span class="label">Score</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="label">Time</span>
            <span class="value" id="time">20</span>
          </div>
          <div class="stat">
            <span class="label">Goal</span>
            <span class="value" id="goal">15</span>
          </div>
        </div>
        <h1>Catch My Heart</h1>
        <p>Tap the hearts before time ends. Reach the goal and unlock a sweet surprise.</p>
        <div class="game-area" id="gameArea" aria-label="Game area"></div>
        <div class="controls">
          <button class="primary" id="startBtn">Start Game</button>
          <button class="secondary" id="resetBtn">Reset</button>
        </div>
        <div class="message" id="message">როცა მზად იქნები დაიწყე ჩემ გულის დაჭერა</div>
        <div class="hint">Tip: works on phone and desktop.</div>
      </div>
      <div class="overlay" id="overlay">
        <div class="win-box">
          <div class="big" id="resultEmoji">💘</div>
          <h2 id="resultTitle">You did it!</h2>
          <p id="resultText">You unlocked my secret message.</p>
          <div class="controls" style="margin-top: 16px">
            <button class="primary" id="playAgainBtn">Play Again</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      const scoreEl = document.getElementById('score');
      const timeEl = document.getElementById('time');
      const goalEl = document.getElementById('goal');
      const gameArea = document.getElementById('gameArea');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const messageEl = document.getElementById('message');
      const overlay = document.getElementById('overlay');
      const resultTitle = document.getElementById('resultTitle');
      const resultText = document.getElementById('resultText');
      const resultEmoji = document.getElementById('resultEmoji');
      const playAgainBtn = document.getElementById('playAgainBtn');
      const goal = 15;
      const duration = 20;
      goalEl.textContent = goal;
      let score = 0;
      let timeLeft = duration;
      let gameRunning = false;
      let timerId = null;
      let spawnId = null;
      let activeHeart = null;
      function updateStats() {
        scoreEl.textContent = score;
        timeEl.textContent = timeLeft;
      }
      function clearHeart() {
        if (activeHeart) {
          activeHeart.remove();
          activeHeart = null;
        }
      }
      function randomBetween(min, max) {
        return Math.random() * (max - min) + min;
      }
      function spawnHeart() {
        clearHeart();
        if (!gameRunning) return;
        const heart = document.createElement('button');
        heart.className = 'heart';
        heart.type = 'button';
        heart.setAttribute('aria-label', 'Heart to click');
        heart.textContent = Math.random() > 0.18 ? '💖' : '💝';
        const areaRect = gameArea.getBoundingClientRect();
        const size = 58;
        const left = randomBetween(8, Math.max(9, areaRect.width - size - 8));
        const top = randomBetween(8, Math.max(9, areaRect.height - size - 8));
        heart.style.left = left + 'px';
        heart.style.top = top + 'px';
        heart.addEventListener('click', (e) => {
          if (!gameRunning) return;
          score += 1;
          updateStats();
          messageEl.textContent = score < goal ? 'Nice! Keep going 💗' : 'Goal reached!';
          createFloatingScore(e.clientX, e.clientY, '+1');
          createSparkles(left + 28, top + 28);
          if (score >= goal) {
            endGame(true);
            return;
          }
          spawnHeart();
        });
        gameArea.appendChild(heart);
        activeHeart = heart;
      }
      function createFloatingScore(x, y, text) {
        const node = document.createElement('div');
        node.className = 'floating';
        node.textContent = text;
        node.style.left = x - 10 + 'px';
        node.style.top = y - 12 + 'px';
        document.body.appendChild(node);
        setTimeout(() => node.remove(), 700);
      }
      function createSparkles(x, y) {
        for (let i = 0; i < 6; i++) {
          const s = document.createElement('div');
          s.className = 'sparkle';
          s.style.left = x + 'px';
          s.style.top = y + 'px';
          s.style.setProperty('--x', randomBetween(-40, 40) + 'px');
          s.style.setProperty('--y', randomBetween(-40, 18) + 'px');
          gameArea.appendChild(s);
          setTimeout(() => s.remove(), 600);
        }
      }
      function tick() {
        timeLeft -= 1;
        updateStats();
        if (timeLeft <= 0) {
          endGame(score >= goal);
        }
      }
      function startGame() {
        score = 0;
        timeLeft = duration;
        gameRunning = true;
        overlay.classList.remove('show');
        updateStats();
        messageEl.textContent = 'Go! Tap every heart you see 💕';
        clearInterval(timerId);
        clearInterval(spawnId);
        clearHeart();
        spawnHeart();
        timerId = setInterval(tick, 1000);
        spawnId = setInterval(() => {
          if (gameRunning) spawnHeart();
        }, 900);
      }
      function endGame(won) {
        gameRunning = false;
        clearInterval(timerId);
        clearInterval(spawnId);
        clearHeart();
        if (won) {
          resultEmoji.textContent = '💌';
          resultTitle.textContent = 'You won my heart!';
          resultText.textContent =
            'Secret message: You make every day sweeter. Date reward unlocked 🌹';
          messageEl.textContent = 'Mission complete 💖';
        } else {
          resultEmoji.textContent = '🥹';
          resultTitle.textContent = 'Almost there!';
          resultText.textContent =
            'You caught ' + score + ' hearts. Try once more and unlock the surprise.';
          messageEl.textContent = 'So close — one more round 💞';
        }
        overlay.classList.add('show');
      }
      function resetGame() {
        gameRunning = false;
        clearInterval(timerId);
        clearInterval(spawnId);
        clearHeart();
        score = 0;
        timeLeft = duration;
        updateStats();
        overlay.classList.remove('show');
        messageEl.textContent = 'როცა მზად იქნები დაიწყე ჩემ გულის დაჭერა';
        Array.from(document.querySelectorAll('.sparkle, .floating')).forEach((el) => el.remove());
      }
      startBtn.addEventListener('click', startGame);
      resetBtn.addEventListener('click', resetGame);
      playAgainBtn.addEventListener('click', startGame);
      updateStats();
    </script>
  </body>
</html>
