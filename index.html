<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Click Game</title>
    <link rel="stylesheet" href="css/game.css" />
  </head>
  <body>
    <div class="app">
      <div class="card">
        <div class="topbar">
          <div class="stat">
            <span class="label" id="scoreLabel"></span>
            <span class="value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="label" id="timeLabel"></span>
            <span class="value" id="time">20</span>
          </div>
          <div class="stat">
            <span class="label" id="goalLabel"></span>
            <span class="value" id="goal">15</span>
          </div>
        </div>
        <h1 id="mainHeading"></h1>
        <p id="gameDescription"></p>
        <div class="game-area" id="gameArea" aria-label="Game area"></div>
        <div class="controls">
          <button class="primary" id="startBtn"></button>
          <button class="secondary" id="resetBtn"></button>
        </div>
        <div class="message" id="message"></div>
        <div class="hint" id="hintText"></div>
      </div>
      <div class="overlay" id="overlay">
        <div class="win-box">
          <div class="big" id="resultEmoji"></div>
          <h2 id="resultTitle"></h2>
          <p id="resultText"></p>
          <div class="controls" style="margin-top: 16px">
            <button class="primary" id="playAgainBtn"></button>
          </div>
        </div>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
